<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>News Nexus Digest</title>
</head>
<body>
    <h2>Your News Nexus Digest</h2>
    <p>Here are the latest stories selected for you.</p>
    <ul>
        {% for article in articles %}
            <li>
                <strong>{{ article.headline }}</strong><br>
                {{ article.source }} | {{ article.category|title }}<br>
                <a href="{{ article.url }}">{{ article.url }}</a>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
